services:
  - type: web
    name: homesync
    runtime: node
    plan: free
    buildCommand: npm install --production=false && npm run build --workspace=client && cd database && if [ ! -f /opt/render/project/src/database/.seeded-v2 ]; then cp homesync.seed.db /opt/render/project/src/database/homesync.db && touch /opt/render/project/src/database/.seeded-v2 && echo "Seeded database from local snapshot"; fi && DATABASE_PATH=/opt/render/project/src/database/homesync.db npx knex migrate:latest --knexfile knexfile.js
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /opt/render/project/src/database/homesync.db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://homesynctoday.com
      - key: CLIENT_URL
        value: https://homesynctoday.com
      - key: RESEND_API_KEY
        sync: false  # Get from resend.com dashboard
      - key: FROM_EMAIL
        value: hello@homesynctoday.com
      - key: FROM_NAME
        value: HomeSync
      - key: STRIPE_SECRET_KEY
        sync: false  # Get from Stripe dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false  # Get from Stripe webhook settings
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false  # Get from console.anthropic.com
    disk:
      name: homesync-db
      mountPath: /opt/render/project/src/database
      sizeGB: 1
